{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center" data-aos="fade-up">
  <div class="col-md-5">
    <div class="card p-3 p-md-4">
      <div class="card-body">
        <h4 class="mb-1">Verify OTP</h4>
        <p class="text-muted mb-4">Enter the 6-digit OTP sent to your email.</p>
        <form method="post">
          {{ form.hidden_tag() }}
          <div class="form-floating mb-3">{{ form.otp(class="form-control", placeholder="123456") }}<label>One-time password</label></div>
          {{ form.submit(class="btn btn-success w-100") }}
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
