{% extends "base.html" %}
{% block content %}
<h3 class="text-white mb-3" data-aos="fade-right">Monthly Attendance Report</h3>
<div class="card p-3" data-aos="fade-up">
<table class="table mb-0">
  <thead><tr><th>Month</th><th>Present</th><th>Total</th><th>Percentage</th></tr></thead>
  <tbody>
    {% for m in monthly %}
      <tr>
        <td>{{ m.month }}</td>
        <td>{{ m.present }}</td>
        <td>{{ m.total }}</td>
        <td>{{ ((m.present/m.total)*100)|round(2) if m.total else 0 }}%</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
</div>
{% endblock %}
